<!DOCTYPE html>
<html>
<head>
    <title>Dealer Evaluation</title>
</head>
<body>
    <h1>Dealer Evaluation</h1>
    <div>
        <label>Select Product:</label>
        <select id="productSelect">
            <option value="">-- Select --</option>
        </select>
    </div>
    <div id="dealersContainer"></div>
    <div id="priceContainer"></div>

    <script>
    // URLs de los microservicios (verifica que sean las correctas)
    const productDetailsUrl = 'https://product-details-9vyo.onrender.com';
    const dealerPricesUrl = 'https://dealer-prices.onrender.com';

    const productSelect = document.getElementById('productSelect');
    const dealersContainer = document.getElementById('dealersContainer');
    const priceContainer = document.getElementById('priceContainer');

    // Lista de productos fija (coincide con los datos en app.py)
    const products = [
        { id: 1, name: "Laptop" },
        { id: 2, name: "Smartphone" },
        { id: 3, name: "Tablet" }
    ];

    // Cargar productos en el menú desplegable
    products.forEach(p => {
        const option = document.createElement('option');
        option.value = p.id;
        option.textContent = p.name;
        productSelect.appendChild(option);
    });

    // Evento al seleccionar un producto
    productSelect.addEventListener('change', function() {
        const productId = this.value;
        if (!productId) {
            dealersContainer.innerHTML = '';
            priceContainer.innerHTML = '';
            return;
        }

        // Construir la URL completa y mostrarla en consola para depurar
        const url = `${dealerPricesUrl}/prices/${productId}`;
        console.log('Fetching URL:', url); // <-- Muestra la URL en consola

        // Obtener distribuidores y precios
        fetch(url)
            .then(response => {
                console.log('Response status:', response.status); // <-- Muestra el código de estado
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Data received:', data); // <-- Muestra los datos recibidos
                if (data.length === 0) {
                    dealersContainer.innerHTML = '<p>No hay distribuidores para este producto.</p>';
                    return;
                }
                let html = '<h3>Dealers:</h3><ul>';
                data.forEach(item => {
                    html += `<li>${item.dealer} - $${item.price}</li>`;
                });
                html += '</ul>';
                dealersContainer.innerHTML = html;
                priceContainer.innerHTML = '';
            })
            .catch(err => {
                console.error('Error en fetch:', err); // <-- Muestra el error exacto
                dealersContainer.innerHTML = `<p style="color:red">Error al cargar distribuidores. Detalle: ${err.message}</p>`;
            });
    });
    </script>
</body>
</html>
